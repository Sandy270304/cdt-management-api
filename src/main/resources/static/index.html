<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CDT Management - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

<div class="login-background-shape login-shape-yellow"></div>
<div class="login-background-shape login-shape-purple"></div>
<div class="login-background-shape login-shape-green"></div>

<div class="login-container">
    <div class="login-card">
        <div class="brand-ribbons">
            <span class="brand-ribbon brand-ribbon-purple"></span>
            <span class="brand-ribbon brand-ribbon-yellow"></span>
            <span class="brand-ribbon brand-ribbon-green"></span>
        </div>

        <h1>CDT Management</h1>
        <p class="subtitle">Advisor Access</p>

        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="advisor.admin" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <button type="submit">Sign in</button>
        </form>

        <p id="loginMessage" class="message"></p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
