<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDT Bancolombia - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

<div class="background-arc background-arc-purple"></div>
<div class="background-arc background-arc-orange"></div>
<div class="background-arc background-arc-yellow"></div>
<div class="background-arc background-arc-purple-right"></div>

<div class="login-container">
    <div class="login-card">
        <div class="brand-ribbons">
            <span class="brand-ribbon brand-ribbon-black ribbon-1"></span>
            <span class="brand-ribbon brand-ribbon-black ribbon-2"></span>
            <span class="brand-ribbon brand-ribbon-black ribbon-3"></span>
        </div>

        <h1>CDT Bancolombia</h1>
        <p class="subtitle">Advisor Access</p>

        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <button type="submit">Sign in</button>
        </form>

        <p id="loginMessage" class="message"></p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
